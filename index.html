    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(15,110,86,0.72) 0%, rgba(29,158,117,0.60) 50%, rgba(10,60,50,0.78) 100%);
  }
  .login-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
    animation: loginIn 0.4s ease;
  }
  @keyframes loginIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .login-logo {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 0.5rem;
  }
  .login-logo-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    flex-shrink: 0;
    background: #fff;
    border: 2px solid rgba(29,158,117,0.25);
  }
  .login-logo-icon img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .login-logo-text { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .login-subtitle { text-align: center; font-size: 12px; color: var(--text3); margin-bottom: 2rem; }

  .role-tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 1.5rem;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 4px;
  }
  .role-tab {
    padding: 9px; border: none; background: none;
    border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text3);
    font-family: inherit; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .role-tab.active { background: var(--surface); color: var(--green); box-shadow: var(--shadow); }

  .login-form-group { margin-bottom: 1rem; }
  .login-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .login-input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius); font-size: 14px; font-family: inherit;
    color: var(--text); background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  .login-btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 0.5rem;
    box-shadow: 0 4px 12px rgba(29,158,117,0.35);
  }
  .login-btn:hover { opacity: 0.9; }
  .login-hint {
    margin-top: 1.25rem; padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 12px; color: var(--text3);
    line-height: 1.5;
  }
  .login-hint strong { color: var(--text2); }
  .login-error {
    margin-top: 0.75rem; padding: 10px 12px;
    background: var(--red-light); border: 1px solid #f5c6c6;
    border-radius: var(--radius); font-size: 12px; color: var(--red-text);
    display: none;
  }

  /* ── APP SHELL ── */
  #app-shell { display: none; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; display: flex; align-items: center;
    height: 56px; position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 16px; color: var(--text); text-decoration: none;
  }
  .logo-icon {
    width: 34px; height: 34px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    border: 1px solid var(--border);
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
  .logo-sub { font-size: 11px; font-weight: 400; color: var(--text3); margin-left: 2px; letter-spacing: 0.02em; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .user-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px 5px 6px;
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 12px; font-weight: 500; color: var(--text2);
    background: var(--surface2);
  }
  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
  }
  .user-avatar.admin { background: var(--green); }
  .user-avatar.teacher { background: var(--blue); }
  .role-badge-pill {
    padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600;
  }
  .role-badge-pill.admin { background: var(--green-light); color: var(--green-text); }
  .role-badge-pill.teacher { background: var(--blue-light); color: var(--blue-text); }

  .notif-btn {
    position: relative; background: none; border: 1px solid var(--border);
    border-radius: var(--radius); width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2); font-size: 18px; transition: background 0.15s;
  }
  .notif-btn:hover { background: var(--surface2); }
  .notif-badge {
    position: absolute; top: 5px; right: 5px;
    background: var(--red); color: #fff; font-size: 9px; font-weight: 600;
    border-radius: 50%; width: 14px; height: 14px;
    display: none; align-items: center; justify-content: center;
    border: 2px solid var(--surface);
  }
  .logout-btn {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 12px; font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; color: var(--text3); background: var(--surface);
    display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  }
  .logout-btn:hover { color: var(--red); border-color: var(--red); background: var(--red-light); }

  /* ── NAV ── */
  .nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; padding: 0 1.5rem; gap: 2px;
  }
  .nav-tab {
    padding: 12px 18px; font-size: 13px; font-weight: 500; color: var(--text3);
    cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 7px; transition: color 0.15s; white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text2); }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .nav-tab i { font-size: 16px; }

  /* ── AI SEARCH BANNER ── */
  .ai-search-section {
    background: linear-gradient(135deg, #0F6E56 0%, #1D9E75 100%);
    border-radius: var(--radius-lg);
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .ai-search-section::before {
    content:'';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .ai-search-title {
    color: #fff; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .ai-search-subtitle { color: rgba(255,255,255,0.75); font-size: 12px; margin-bottom: 1rem; }
  .ai-search-row { display: flex; gap: 10px; }
  .ai-search-input {
    flex: 1;
    padding: 10px 14px;
    border: none; border-radius: var(--radius);
    font-size: 14px; font-family: inherit;
    color: var(--text); outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .ai-search-input::placeholder { color: var(--text3); }
  .ai-search-btn {
    padding: 10px 18px;
    background: rgba(255,255,255,0.2);
    color: #fff; border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius); font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s; white-space: nowrap;
  }
  .ai-search-btn:hover { background: rgba(255,255,255,0.3); }
  .ai-search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .ai-results-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: 1.25rem;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .ai-results-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(to right, #E1F5EE, #F4F6F8);
  }
  .ai-results-header span {
    font-size: 13px; font-weight: 600; color: var(--green-text);
    flex: 1;
  }
  .ai-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: var(--green); color: #fff;
  }
  .ai-results-body { padding: 1rem 1.25rem; }
  .ai-summary { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 1rem; }
  .ai-equip-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .ai-equip-item {
    border: 2px solid var(--green-light); border-radius: var(--radius);
    padding: 10px 12px; cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
    background: var(--surface);
  }
  .ai-equip-item:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(29,158,117,0.15); }
  .ai-equip-emoji { font-size: 24px; margin-bottom: 6px; }
  .ai-equip-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .ai-equip-reason { font-size: 11px; color: var(--text3); line-height: 1.4; }
  .ai-match-score {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600; color: var(--green);
    background: var(--green-light); padding: 2px 7px; border-radius: 20px;
    margin-top: 6px;
  }
  .ai-thinking {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; font-size: 13px; color: var(--text3);
    font-style: italic;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border2);
    border-top-color: var(--green); border-radius: 50;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
    border-radius: 50%;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  .main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* ── STATS ── */
  .stat-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
  }
  .stat-icon {
    width: 40px; height: 40px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .stat-icon.green { background: var(--green-light); color: var(--green); }
  .stat-icon.blue  { background: var(--blue-light);  color: var(--blue); }
  .stat-icon.amber { background: var(--amber-light); color: var(--amber); }
  .stat-icon.red   { background: var(--red-light);   color: var(--red); }
  .stat-num { font-size: 22px; font-weight: 600; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem;
    margin-bottom: 1.25rem; box-shadow: var(--shadow);
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
  }
  .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-title i { color: var(--green); font-size: 16px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: background 0.15s, border-color 0.15s; white-space: nowrap; font-family: inherit;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
  .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-danger:hover { background: var(--red-dark); border-color: var(--red-dark); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--border); }

  /* ── SEARCH / FILTER ── */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; }
  .search-wrap input {
    width: 100%; padding: 7px 10px 7px 34px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-size: 13px; font-family: inherit;
    background: var(--surface); color: var(--text); outline: none;
  }
  .search-wrap input:focus { border-color: var(--green); }

  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-tab {
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border2); cursor: pointer; background: var(--surface);
    color: var(--text3); font-family: inherit; transition: all 0.15s;
  }
  .filter-tab:hover { border-color: var(--green); color: var(--green); }
  .filter-tab.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* ── EQUIPMENT GRID ── */
  .equip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
  .equip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s; box-shadow: var(--shadow);
  }
  .equip-card:hover { border-color: var(--green); box-shadow: 0 4px 16px rgba(29,158,117,0.15); transform: translateY(-2px); }
  .equip-thumb { width: 100%; height: 96px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 42px; border-bottom: 1px solid var(--border); overflow:hidden; }
  .equip-thumb img { width:100%; height:100%; object-fit:cover; }
  .photo-upload-zone { display:flex; align-items:center; gap:10px; border:2px dashed var(--border2); border-radius:var(--radius); padding:10px 12px; cursor:pointer; transition:border-color 0.15s; }
  .photo-upload-zone:hover { border-color:var(--green); }
  .photo-preview { width:52px; height:52px; border-radius:8px; object-fit:cover; border:1px solid var(--border); flex-shrink:0; }
  .photo-placeholder { width:52px; height:52px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .borrow-equip-info { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:1rem; display:flex; align-items:center; gap:12px; }
  .borrow-equip-thumb { width:44px; height:44px; border-radius:8px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden; }
  .borrow-equip-thumb img { width:100%; height:100%; object-fit:cover; }
  .equip-body { padding: 10px 12px 12px; }
  .equip-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; line-height: 1.3; }
  .equip-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
  .equip-info { font-size: 11px; color: var(--text3); }
  .equip-borrow-chip {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--blue-text);
    background: var(--blue-light); border-radius: 20px; padding: 2px 8px; margin-top: 4px;
  }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-bio   { background: var(--green-light); color: var(--green-text); }
  .badge-chem  { background: var(--purple-light); color: var(--purple-text); }
  .badge-phys  { background: var(--blue-light); color: var(--blue-text); }
  .badge-math  { background: var(--amber-light); color: var(--amber-text); }
  .badge-svc   { background: var(--green-light); color: var(--green-text); }
  .badge-unsvc { background: var(--red-light); color: var(--red-text); }
  .badge-good  { background: var(--green-light); color: var(--green-text); }
  .badge-slight{ background: var(--amber-light); color: var(--amber-text); }
  .badge-dmg   { background: var(--red-light); color: var(--red-text); }
  .badge-active{ background: var(--blue-light); color: var(--blue-text); }
  .badge-overdue{ background: var(--red-light); color: var(--red-text); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 600;
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap;
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  /* ── FORMS ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .form-control {
    width: 100%; padding: 8px 11px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-size: 13px; font-family: inherit;
    color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .form-control:focus { border-color: var(--green); }
  textarea.form-control { resize: vertical; min-height: 72px; }

  /* ── MODAL ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.48); z-index: 300;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 1rem; overflow-y: auto; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    width: 100%; max-width: 520px; padding: 1.5rem;
    box-shadow: var(--shadow-md); position: relative; animation: modal-in 0.18s ease;
  }
  @keyframes modal-in { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; padding-bottom: 0.875rem; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; border-radius: var(--radius); padding: 2px; display: flex; align-items: center; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* ── NOTIFICATIONS ── */
  .notif-panel {
    position: fixed; top: 57px; right: 12px; width: 340px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); z-index: 200; box-shadow: var(--shadow-md);
    overflow: hidden; animation: fade-in 0.15s ease;
  }
  @keyframes fade-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .notif-head { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--red-text); background: var(--red-light); }
  .notif-body { max-height: 360px; overflow-y: auto; }
  .notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); border-left: 3px solid var(--red); }
  .notif-item:last-child { border-bottom: none; }
  .notif-equip { font-weight: 600; font-size: 13px; }
  .notif-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .notif-hrs { font-size: 11px; color: var(--red); font-weight: 600; margin-top: 3px; }
  .notif-empty { padding: 1.5rem; text-align: center; color: var(--text3); font-size: 13px; }

  /* ── REPORTS ── */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { width: 140px; font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 6px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
  .bar-count { font-size: 12px; font-weight: 600; color: var(--text2); min-width: 24px; text-align: right; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── DETAIL INFO GRID ── */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .detail-item { font-size: 13px; }
  .detail-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* ── TEACHER VIEW INFO BANNER ── */
  .teacher-banner {
    background: linear-gradient(to right, var(--blue-light), #f0f7ff);
    border: 1px solid #c3daf7; border-radius: var(--radius-lg);
    padding: 12px 16px; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--blue-text);
  }
  .teacher-banner i { font-size: 20px; flex-shrink: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .stat-row { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .equip-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 1rem 0.75rem; }
    .topbar { padding: 0 1rem; }
    .nav { padding: 0 0.5rem; }
    .nav-tab { padding: 10px 12px; font-size: 12px; }
    .ai-search-row { flex-direction: column; }
    .login-card { padding: 2rem 1.5rem 1.5rem; }
  }
  @media (max-width: 400px) {
    .stat-row { grid-template-columns: 1fr; }
    .equip-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════
let ACCOUNTS = {
  admin:   { pass: 'admin123',   role: 'admin',   displayName: 'System Admin' },
  teacher: { pass: 'teacher123', role: 'teacher', displayName: 'Teacher' },
};

let currentUser  = null;
let selectedRole = 'admin';

function selectRole(role, clearFields) {
  selectedRole = role;
  document.getElementById('role-admin-tab').classList.toggle('active', role === 'admin');
  document.getElementById('role-teacher-tab').classList.toggle('active', role === 'teacher');
  if (clearFields !== false) {
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-error').style.display = 'none';
  }
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  // Hard-set built-in accounts every time — localStorage can never override these
  ACCOUNTS['admin']   = { pass: 'admin123',   role: 'admin',   displayName: 'System Admin' };
  ACCOUNTS['teacher'] = { pass: 'teacher123', role: 'teacher', displayName: 'Teacher' };
  const acc  = ACCOUNTS[user];
  // Validate credentials — also ensure selected role tab matches the account role
  if (!acc || acc.pass !== pass) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  // Auto-correct the role tab if user typed in wrong tab
  if (acc.role !== selectedRole) {
    selectRole(acc.role, false);
  }
  currentUser = { username: user, ...acc };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  setupForRole();
  render();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display   = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
  currentTab = 'inventory'; catFilter = 'All'; searchQ = '';
  aiResults  = null; aiTopic = '';
}

function setupForRole() {
  const isAdmin = currentUser.role === 'admin';

  // Avatar
  const av = document.getElementById('user-avatar');
  av.textContent = currentUser.displayName.slice(0,2).toUpperCase();
  av.className = 'user-avatar ' + currentUser.role;

  document.getElementById('user-display-name').textContent = currentUser.displayName;

  const roleBadge = document.getElementById('user-role-badge');
  roleBadge.textContent = isAdmin ? 'Admin' : 'Teacher';
  roleBadge.className = 'role-badge-pill ' + currentUser.role;

  // Show/hide admin-only elements
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
  // For sync status, use flex not block
  const syncEl = document.getElementById('gd-sync-status');
  if(syncEl && isAdmin){
    syncEl.style.display = gdMode ? 'flex' : 'none';
    if(gdMode) showSyncStatus(gdSignedIn ? 'ok' : 'syncing');
  }

  // Switch back to inventory tab
  currentTab = 'inventory';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.nav-tab').classList.add('active');
}

// ══════════════════════════════════════════════════════
// AI TOPIC SEARCH — description-based smart matching
// ══════════════════════════════════════════════════════
function scoreEquipment(equip, topicWords) {
  // Combine all searchable text from the equipment
  const haystack = [
    equip.name,
    equip.desc,
    equip.cat,
    equip.serial
  ].join(' ').toLowerCase();

  let score = 0;
  const matchedWords = [];

  topicWords.forEach(word => {
    if (word.length < 3) return; // skip tiny words
    if (haystack.includes(word)) {
      // Weight: word in description = 2pts, word in name = 4pts, word in category = 1pt
      if (equip.name.toLowerCase().includes(word)) { score += 4; matchedWords.push(word); }
      else if (equip.desc.toLowerCase().includes(word)) { score += 2; matchedWords.push(word); }
      else if (equip.cat.toLowerCase().includes(word)) { score += 1; matchedWords.push(word); }
    }
  });

  // Also do partial / stem matching for common science words
  const stems = {
    'heat': ['temperature','thermal','boil','celsius','heat','thermometer'],
    'light': ['optic','lens','refract','reflect','light','wavelength','prism'],
    'electric': ['volt','current','circuit','resistance','ohm','electric','battery','charge'],
    'chemical': ['reaction','solution','acid','base','titrat','precipit','chemical','mix','dissolv'],
    'biology': ['cell','tissue','organism','microb','dissect','specimen','biology','living','plant','animal'],
    'force': ['force','mass','weight','gravity','newton','motion','friction','pressure'],
    'measurement': ['measure','mass','volume','length','area','density','weigh','balance'],
    'wave': ['sound','frequency','vibrat','wave','oscillat','amplitud','acoustic'],
    'genetics': ['dna','gene','heredit','chromosom','inherit','genetic','cell'],
    'photosynthesis': ['plant','leaf','chlorophyll','light','glucose','oxygen','carbon','biology'],
    'geometry': ['angle','triangle','circle','polygon','protract','compass','construct','bisect'],
    'stoichiometry': ['mass','mole','react','balance','chemical','beaker','weigh'],
  };

  topicWords.forEach(word => {
    Object.keys(stems).forEach(key => {
      if (key.includes(word) || word.includes(key)) {
        stems[key].forEach(relatedWord => {
          if (haystack.includes(relatedWord) && !matchedWords.includes(relatedWord)) {
            score += 1;
          }
        });
      }
    });
  });

  return { score, matchedWords: [...new Set(matchedWords)] };
}

function getMatchScore(score) {
  if (score >= 6) return 'High';
  if (score >= 3) return 'Medium';
  return 'Low';
}

function getReason(equip, topicWords, matchedWords) {
  // Build a natural reason from the description based on matched words
  const desc = equip.desc;
  // Find the most relevant sentence in description
  const sentences = desc.split(/[.!?]+/).filter(s => s.trim().length > 10);
  let bestSentence = '';
  let bestCount = 0;
  sentences.forEach(s => {
    const sl = s.toLowerCase();
    const count = topicWords.filter(w => sl.includes(w)).length;
    if (count > bestCount) { bestCount = count; bestSentence = s.trim(); }
  });
  if (!bestSentence && sentences.length > 0) bestSentence = sentences[0].trim();
  // Truncate to ~15 words
  const words = bestSentence.split(' ');
  return words.length > 14 ? words.slice(0, 14).join(' ') + '…' : bestSentence;
}

async function runAiSearch() {
  const topicInput = document.getElementById('ai-topic-input');
  if (!topicInput) return;
  const topic = topicInput.value.trim();
  if (!topic) return;

  aiLoading = true;
  aiTopic   = topic;
  aiResults = null;
  renderInventory();

  // Small delay so loading spinner shows
  await new Promise(r => setTimeout(r, 300));

  try {
    // Tokenize topic into meaningful words
    const stopWords = new Set(['the','and','or','for','in','on','to','a','an','of','is','are','be','used','that','with','this','its','use','using','can','how','what','about','when','where','why','which']);
    const topicWords = topic.toLowerCase()
      .replace(/[^\w\s]/g, ' ')
      .split(/\s+/)
      .filter(w => w.length >= 3 && !stopWords.has(w));

    if (topicWords.length === 0) {
      aiResults = { error: true, summary: 'Please enter a more specific topic to search.' };
      aiLoading = false; renderInventory(); return;
    }

    // Score every piece of equipment
    const scored = equipment.map(e => {
      const { score, matchedWords } = scoreEquipment(e, topicWords);
      return { equip: e, score, matchedWords };
    }).filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 5);

    if (scored.length === 0) {
      aiResults = {
        error: false,
        summary: `No equipment descriptions closely match "${topic}". Try different keywords like the subject area or type of experiment.`,
        recommendations: []
      };
    } else {
      const topScore = scored[0].score;
      const recommendations = scored.map(({ equip: e, score, matchedWords }) => ({
        id: e.id,
        reason: getReason(e, topicWords, matchedWords),
        matchScore: getMatchScore(score)
      }));

      // Build summary
      const names = scored.slice(0, 3).map(x => x.equip.name).join(', ');
      aiResults = {
        error: false,
        summary: `Found ${scored.length} matching apparatus for "${topic}". Top matches: ${names}. Results ranked by how closely each equipment's description matches your topic.`,
        recommendations
      };
    }
  } catch(err) {
    aiResults = { error: true, summary: 'Search failed. Please try again.' };
  }

  aiLoading = false;
  renderInventory();
}

        <td style="text-align:center;font-weight:600">${b.qty||1}</td>
        <td style="font-size:12px;color:var(--text3)">${fmt(b.borrowed)}</td>
        <td style="font-size:12px;color:var(--text3)">${fmt(b.returned)}</td>
        <td><span class="badge ${condBadge}">${b.status||'—'}</span></td>
      </tr>`;
    });
  }

  html += `</tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}

// ══════════════════════════════════════════════════════
// REPORTS (admin only)
// ══════════════════════════════════════════════════════
function renderReports(){
  const catRows = CATS.map(c => {
    const items  = equipment.filter(e => e.cat === c);
    const svc    = items.filter(e => e.remarks === 'Serviceable').length;
    const units  = items.reduce((s,e) => s + e.qty, 0);
    const timesB = borrows.filter(b => items.some(e => e.id === b.equipId)).length;
    return {cat:c, types:items.length, units, svc, timesB};
  });

  const teacherMap = {};
  borrows.forEach(b => {
    if(!teacherMap[b.teacher]) teacherMap[b.teacher] = {name:b.teacher, count:0, items:new Set(), active:0};
    teacherMap[b.teacher].count++;
    teacherMap[b.teacher].items.add(b.equipName);
    if(b.active) teacherMap[b.teacher].active++;
  });
  const teacherList = Object.values(teacherMap).sort((a,b) => b.count - a.count);

  const itemMap = {};
  borrows.forEach(b => {
    if(!itemMap[b.equipName]) itemMap[b.equipName] = {name:b.equipName, count:0};
    itemMap[b.equipName].count++;
  });
  const itemList = Object.values(itemMap).sort((a,b) => b.count - a.count);
  const maxB = itemList[0]?.count || 1;

  let html = `
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-layout-grid"></i>Inventory by Category</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Category</th><th>Types</th><th>Total Units</th><th>Serviceable</th><th>Times Borrowed</th></tr></thead>
      <tbody>
      ${catRows.map(r => `<tr>
        <td><span class="badge ${CAT_BADGE[r.cat]}">${CAT_ICONS[r.cat]} ${r.cat}</span></td>
        <td>${r.types}</td><td>${r.units}</td>
        <td><span style="color:var(--green);font-weight:600">${r.svc}</span> / ${r.types}</td>
        <td>${r.timesB}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-users"></i>Borrow Activity by Teacher</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Teacher</th><th>Total Borrows</th><th>Currently Active</th><th>Unique Items</th></tr></thead>
      <tbody>
      ${teacherList.length===0?'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:1.5rem">No borrow records</td></tr>':''}
      ${teacherList.map((t,i) => `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--green-light);color:var(--green-text);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;flex-shrink:0">${t.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}</div>
            <span style="font-weight:500">${t.name}</span>
            ${i===0?'<span class="badge" style="background:#FAEEDA;color:#633806;font-size:10px">Top borrower</span>':''}
          </div>
        </td>
        <td><strong>${t.count}</strong></td>
        <td>${t.active>0?`<span class="badge badge-active">${t.active} active</span>`:'—'}</td>
        <td style="font-size:12px;color:var(--text2)">${[...t.items].join(', ')}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-trending-up"></i>Most &amp; Least Borrowed Equipment</span></div>
    ${itemList.length===0?'<div class="empty" style="padding:1rem"><i class="ti ti-chart-bar"></i>No borrow data yet</div>':''}
    ${itemList.map((item,i) => {
      const isMost = i===0; const isLeast = i===itemList.length-1;
      const color = isMost ? 'var(--green)' : isLeast ? 'var(--blue)' : '#9FE1CB';
      return `<div class="bar-row">
        <span class="bar-label" title="${item.name}">${isMost?'🔥 ':isLeast?'❄️ ':''} ${item.name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(item.count/maxB*100)}%;background:${color}"></div></div>
        <span class="bar-count">${item.count}</span>
      </div>`;
    }).join('')}
    <div style="font-size:11px;color:var(--text3);margin-top:12px;display:flex;gap:16px">
      <span>🔥 Most borrowed</span><span>❄️ Least borrowed</span><span>Numbers = total borrows</span>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function toLocal(d){ const off = d.getTimezoneOffset(); return new Date(d.getTime()-off*60000).toISOString().slice(0,16); }

function showModal(html){
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-bg" onclick="bgClose(event)"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modal-container').innerHTML = ''; }
function bgClose(e){ if(e.target.classList.contains('modal-bg')) closeModal(); }

function saveEquip(id){
  if(!currentUser || currentUser.role !== 'admin') return;
  const name    = document.getElementById('f-name').value.trim();
  const serial  = document.getElementById('f-serial').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const qty     = parseInt(document.getElementById('f-qty').value) || 1;
  const remarks = document.getElementById('f-remarks').value;
  const img     = document.getElementById('f-img').value.trim() || '📦';
  const desc    = document.getElementById('f-desc').value.trim();
  const photo   = document.getElementById('f-photo-b64').value || '';
  if(!name || !serial){ alert('Please fill in all required fields.'); return; }
  if(id){
    const e = equipment.find(x => x.id === id);
    Object.assign(e, {name, serial, cat, qty, remarks, img, desc, photo});
  } else {
    equipment.push({id:nextId++, name, qty, img, photo, desc, cat, serial, remarks, borrowed:0});
  }
  closeModal(); saveToStorage(); render();
}

function deleteEquip(id){
  if(!currentUser || currentUser.role !== 'admin') return;
  if(!confirm('Delete this equipment? This cannot be undone.')) return;
  equipment = equipment.filter(e => e.id !== id);
  saveToStorage(); closeModal(); render();
}

// ══════════════════════════════════════════════════════
// PHOTO UPLOAD HELPERS
// ══════════════════════════════════════════════════════
function previewEquipPhoto(input, wrapId, hiddenId){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5 * 1024 * 1024){ alert('Photo must be under 5MB.'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const b64 = e.target.result;
    document.getElementById(hiddenId).value = b64;
    const wrap = document.getElementById(wrapId);
    wrap.className = '';
    wrap.innerHTML = `<img src="${b64}" class="photo-preview" id="photo-preview-img">`;
  };
  reader.readAsDataURL(file);
}

function removeEquipPhoto(){
  document.getElementById('f-photo-b64').value = '';
  const wrap = document.getElementById('photo-preview-wrap');
  const emoji = document.getElementById('f-img').value || '📦';
  wrap.className = 'photo-placeholder';
  wrap.innerHTML = `<span id="photo-emoji-preview">${emoji}</span>`;
}

function openBorrowModal(presetId){
  if(!currentUser || currentUser.role !== 'admin') return;
  const opts = equipment.filter(e => e.remarks === 'Serviceable');

      <select class="form-control" id="b-equip" onchange="updateBorrowInfo()">
        ${opts.map(e=>`<option value="${e.id}" ${e.id===presetId?'selected':''}>${e.name} (${e.cat}) — Qty: ${e.qty}</option>`).join('')}
      </select>
    </div>
    <div class="borrow-equip-info" id="b-equip-info">

    </div>

    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Grade Level *</label>
        <select class="form-control" id="b-grade">
          <option value="">— Select Grade —</option>
          <option>Grade 7</option><option>Grade 8</option><option>Grade 9</option>
          <option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Section *</label>
        <input class="form-control" id="b-section" placeholder="e.g. Sampaguita">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Quantity to Borrow *</label>
        <input class="form-control" id="b-qty" type="number" min="1" value="1" oninput="validateBorrowQty()">
        <div id="b-qty-hint" style="font-size:11px;color:var(--text3);margin-top:4px"></div>
      </div>
      <div class="form-group"><label class="form-label">Date &amp; Time Borrowed *</label>
        <input class="form-control" id="b-date" type="datetime-local" value="${toLocal(new Date())}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBorrow()"><i class="ti ti-check"></i>Confirm Borrow</button>
    </div>
  `);

function renderBorrowInfo(e){
  if(!e) return '';
  const available = e.qty - (e.borrowed||0);
  const thumb = e.photo
    ? `<div class="borrow-equip-thumb"><img src="${e.photo}" alt="${e.name}"></div>`
    : `<div class="borrow-equip-thumb" style="font-size:22px">${e.img}</div>`;
  return `
    ${thumb}
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13px">${e.name}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">
        <span style="font-family:monospace;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px">${e.serial}</span>
        &nbsp;·&nbsp; Category: ${e.cat}
      </div>
      <div style="font-size:12px;margin-top:4px">
        Total Qty: <strong>${e.qty}</strong>
        &nbsp;·&nbsp; Currently Out: <strong style="color:${e.borrowed>0?'var(--amber)':'var(--green)'}">${e.borrowed||0}</strong>
        &nbsp;·&nbsp; Available: <strong style="color:${available>0?'var(--green)':'var(--red)'}">${available}</strong>
      </div>
    </div>`;
}

function updateBorrowInfo(){
  const sel = document.getElementById('b-equip');
  if(!sel) return;
  const equipId = parseInt(sel.value);
  const e = equipment.find(x => x.id === equipId);
  const box = document.getElementById('b-equip-info');
  if(box && e){ box.innerHTML = renderBorrowInfo(e); }
  // Reset qty to 1
  const qtyEl = document.getElementById('b-qty');
  if(qtyEl){ qtyEl.value = 1; validateBorrowQty(); }
}

function validateBorrowQty(){
  const sel = document.getElementById('b-equip');
  if(!sel) return;
  const equipId = parseInt(sel.value);
  const e = equipment.find(x => x.id === equipId);
  const qtyEl = document.getElementById('b-qty');
  const hint  = document.getElementById('b-qty-hint');
  if(!e || !qtyEl || !hint) return;
  const available = e.qty - (e.borrowed||0);
  const entered = parseInt(qtyEl.value)||1;
  qtyEl.max = available;
  if(entered > available){
    hint.style.color = 'var(--red)';
    hint.textContent = `⚠ Only ${available} unit(s) available.`;
  } else {
    hint.style.color = 'var(--text3)';
    hint.textContent = `${available} unit(s) available to borrow.`;
  }
}

function saveBorrow(){
  const equipId = parseInt(document.getElementById('b-equip').value);
  const teacher = document.getElementById('b-teacher').value.trim();
  const grade   = document.getElementById('b-grade').value;
  const section = document.getElementById('b-section').value.trim();
  const qty     = parseInt(document.getElementById('b-qty').value) || 1;
  const dateStr = document.getElementById('b-date').value;
  if(!teacher){ alert('Please enter the teacher\'s name.'); return; }
  if(!grade){ alert('Please select a grade level.'); return; }
  if(!section){ alert('Please enter the section.'); return; }
  if(!dateStr){ alert('Please select a borrow date.'); return; }
  const e = equipment.find(x => x.id === equipId);
  const available = e.qty - (e.borrowed||0);
  if(qty < 1 || qty > available){ alert(`Only ${available} unit(s) available. Please enter a valid quantity.`); return; }
  borrows.push({id:nextBorrowId++, equipId, equipName:e.name, serial:e.serial, teacher, grade, section, qty, borrowed:new Date(dateStr), returned:null, status:null, active:true});
  saveToStorage(); closeModal(); render();
}

function saveTeacher(existingUsername){
  const name  = (document.getElementById('t-name') ? document.getElementById('t-name').value.trim() : '');
  const user  = existingUsername || (document.getElementById('t-user') ? document.getElementById('t-user').value.trim().toLowerCase() : '');
  const pass  = document.getElementById('t-pass') ? document.getElementById('t-pass').value : '';
  const pass2 = document.getElementById('t-pass2') ? document.getElementById('t-pass2').value : '';

  if(!name){ alert('Please enter the teacher\'s full name.'); return; }
  if(!existingUsername){
    if(!user){ alert('Please enter a username.'); return; }
    if(ACCOUNTS[user]){ alert('That username is already taken. Please choose another.'); return; }
    if(pass.length < 6){ alert('Password must be at least 6 characters.'); return; }
    if(pass !== pass2){ alert('Passwords do not match.'); return; }
    ACCOUNTS[user] = { pass, role: 'teacher', displayName: name };
  } else {
    ACCOUNTS[existingUsername].displayName = name;
    if(pass){
      if(pass.length < 6){ alert('Password must be at least 6 characters.'); return; }
      if(pass !== pass2){ alert('Passwords do not match.'); return; }
      ACCOUNTS[existingUsername].pass = pass;
    }
  }
  saveToStorage(); closeModal(); renderUsers();
}

function deleteTeacher(username){
  if(!confirm(`Remove teacher account "${username}"? They will no longer be able to log in.`)) return;
  delete ACCOUNTS[username];
  saveToStorage(); renderUsers();
}

// LOCAL STORAGE PERSISTENCE
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// GOOGLE DRIVE STORAGE LAYER
// ══════════════════════════════════════════════════════

// ┌─────────────────────────────────────────────────────┐
// │  SETUP: Replace these with your Google Cloud values │
// │  See the Setup Guide in the app header              │
// └─────────────────────────────────────────────────────┘
const GD_CLIENT_ID  = localStorage.getItem('cmnhs_gd_client_id')  || '';
const GD_API_KEY    = localStorage.getItem('cmnhs_gd_api_key')     || '';
const GD_SCOPES     = 'https://www.googleapis.com/auth/drive.appdata';
const GD_DISCOVERY  = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const GD_FILE_NAME  = 'cmnhs_elabtrack_data.json';
const STORAGE_KEY   = 'cmnhs_elabtrack_v1'; // localStorage fallback

let gdReady       = false;   // gapi loaded
let gdSignedIn    = false;   // user signed in
let gdFileId      = null;    // Drive file ID once found/created
let gdTokenClient = null;    // GIS token client
let gdSaveTimer   = null;    // debounce saves
let gdMode        = (GD_CLIENT_ID && GD_API_KEY); // true = Drive mode

// ── Initialise gapi + GIS ──
function initGoogleDrive(){
  if(!gdMode) { loadFromLocalStorage(); updateBorrowedCounts(); return; }
  gapi.load('client', async () => {
    try {
      await gapi.client.init({ apiKey: GD_API_KEY, discoveryDocs: [GD_DISCOVERY] });
      gdTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GD_CLIENT_ID,
        scope: GD_SCOPES,
        callback: onGdToken,
      });
      gdReady = true;
      // Try silent sign-in first
      const token = sessionStorage.getItem('cmnhs_gd_token');
      if(token){
        gapi.client.setToken(JSON.parse(token));
        gdSignedIn = true;
        await loadFromDrive();
      } else {
        showGdSignInPrompt();
      }
    } catch(err){
      console.error('Drive init failed', err);
      showToast('Google Drive unavailable — using local storage', 'amber');
      gdMode = false;
      loadFromLocalStorage(); updateBorrowedCounts();
    }
  });
}

async function onGdToken(resp){
  if(resp.error){ showToast('Google sign-in failed: ' + resp.error, 'red'); return; }
  sessionStorage.setItem('cmnhs_gd_token', JSON.stringify(gapi.client.getToken()));
  gdSignedIn = true;
  await loadFromDrive();
}

function gdSignIn(){
  if(!gdReady){ showToast('Google API not ready yet, please wait…', 'amber'); return; }
  gdTokenClient.requestAccessToken({ prompt: '' });
}

function gdSignOut(){
  const token = gapi.client.getToken();
  if(token) google.accounts.oauth2.revoke(token.access_token, () => {});
  gapi.client.setToken('');
  sessionStorage.removeItem('cmnhs_gd_token');
  gdSignedIn = false; gdFileId = null;
}

function showGdSignInPrompt(){
  // Show a banner at the top of the login card
  const card = document.querySelector('.login-card');
  if(!card) return;
  const banner = document.createElement('div');
  banner.id = 'gd-banner';
  banner.style.cssText = 'background:var(--blue-light);border:1px solid #93C5FD;border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:12px;color:var(--blue-text);display:flex;align-items:center;gap:8px';
  banner.innerHTML = `<i class="ti ti-brand-google-drive" style="font-size:16px;flex-shrink:0"></i>
    <span>Connect Google Drive to sync data across devices.</span>
    <button onclick="gdSignIn()" style="margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">Connect</button>`;
  card.prepend(banner);
  // Fallback to localStorage while not signed in
  loadFromLocalStorage(); updateBorrowedCounts();
}

// ── LOAD from Drive ──
async function loadFromDrive(){
  try {
    showSyncStatus('syncing');
    // Search for existing data file in appDataFolder
    const search = await gapi.client.drive.files.list({
      spaces: 'appDataFolder',
      fields: 'files(id,name)',
      q: `name='${GD_FILE_NAME}'`,
    });
    const files = search.result.files;
    if(files && files.length > 0){
      gdFileId = files[0].id;
      const resp = await gapi.client.drive.files.get({ fileId: gdFileId, alt: 'media' });
      applyStorageData(resp.result || JSON.parse(resp.body));
    } else {
      // No file yet — load localStorage fallback then save to Drive
      loadFromLocalStorage();
      await saveToDrive();
    }
    updateBorrowedCounts();
    showSyncStatus('ok');
    // If login screen is showing, update the banner
    const banner = document.getElementById('gd-banner');
    if(banner) banner.innerHTML = `<i class="ti ti-brand-google-drive" style="font-size:16px;color:var(--green);flex-shrink:0"></i><span style="color:var(--green-text)"><strong>Google Drive connected.</strong> Data will sync automatically.</span>`;
    render();
  } catch(err){
    console.error('Drive load failed', err);
    showSyncStatus('error');
    showToast('Could not load from Google Drive — using local data', 'amber');
    loadFromLocalStorage(); updateBorrowedCounts();
  }
}

// ── SAVE to Drive (debounced 1.5s) ──
function saveToStorage(){
  // Always mirror to localStorage as backup
  saveToLocalStorage();
  if(!gdMode || !gdSignedIn){ return; }
  clearTimeout(gdSaveTimer);
  gdSaveTimer = setTimeout(saveToDrive, 1500);
}

async function saveToDrive(){
  try {
    showSyncStatus('syncing');
    const payload = buildPayload();
    const json = JSON.stringify(payload, null, 2);
    const boundary = '-------cmnhsboundary';
    const contentType = 'application/json';
    const metadata = JSON.stringify({ name: GD_FILE_NAME, parents: gdFileId ? undefined : ['appDataFolder'] });

    let url, method;
    if(gdFileId){
      url    = `https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=multipart`;
      method = 'PATCH';
    } else {
      url    = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      method = 'POST';
    }

    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n--${boundary}\r\nContent-Type: ${contentType}\r\n\r\n${json}\r\n--${boundary}--`;

    const resp = await fetch(url, {
      method,
      headers: {
        'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
        'Content-Type': `multipart/related; boundary="${boundary}"`,
      },
      body,
    });
    const result = await resp.json();
    if(result.id) gdFileId = result.id;
    showSyncStatus('ok');
  } catch(err){
    console.error('Drive save failed', err);
    showSyncStatus('error');
  }
}

// ── SYNC STATUS INDICATOR ──
function showSyncStatus(state){
  let el = document.getElementById('gd-sync-status');
  if(!el || !gdMode) return;
  const icons = { syncing:'ti-cloud-upload', ok:'ti-cloud-check', error:'ti-cloud-x' };
  const colors = { syncing:'var(--text3)', ok:'var(--green)', error:'var(--red)' };
  const labels = { syncing:'Syncing…', ok:'Synced to Drive', error:'Sync error' };
  el.innerHTML = `<i class="ti ${icons[state]}" style="font-size:14px;color:${colors[state]}"></i><span style="font-size:11px;color:${colors[state]}">${labels[state]}</span>`;
}

// ── BUILD PAYLOAD ──
function buildPayload(){
  return {
    _meta: { system:'CMNHS e-LabTrack', school:'Central Mangilala National High School', savedAt: new Date().toISOString(), version:1 },
    equipment,
    nextId,
    borrows: borrows.map(b => ({
      ...b,
      borrowed: b.borrowed ? b.borrowed.toISOString() : null,
      returned: b.returned ? b.returned.toISOString() : null,
    })),
    nextBorrowId,
    accounts: Object.fromEntries(Object.entries(ACCOUNTS).filter(([u,a]) => a.role === 'teacher')),
  };
}

// ── APPLY DATA ──
function applyStorageData(d){
  if(!d) return;
  if(d.equipment)    equipment    = d.equipment;
  if(d.nextId)       nextId       = d.nextId;
  if(d.nextBorrowId) nextBorrowId = d.nextBorrowId;
  if(d.accounts){
    Object.keys(d.accounts).forEach(u => {
      if(d.accounts[u].role === 'teacher') ACCOUNTS[u] = d.accounts[u];
    });
  }
  if(d.borrows){
    borrows = d.borrows.map(b => ({
      ...b,
      borrowed: b.borrowed ? new Date(b.borrowed) : null,
      returned: b.returned ? new Date(b.returned) : null,
    }));
  }
}

// ── LOCALSTORAGE FALLBACK ──
function saveToLocalStorage(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(buildPayload())); } catch(e){}
}

function loadFromLocalStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    applyStorageData(JSON.parse(raw));
  } catch(e){ localStorage.removeItem(STORAGE_KEY); }
}

// ── STARTUP ──
window.addEventListener('load', () => {
  // Give Google scripts 2s to load, then init
  setTimeout(() => {
    if(typeof gapi !== 'undefined' && typeof google !== 'undefined' && gdMode){
      initGoogleDrive();
    } else {
      loadFromLocalStorage(); updateBorrowedCounts();
    }
  }, 800);
});
// Immediate fallback so login works before Google loads
loadFromLocalStorage();
updateBorrowedCounts();

// ── DRIVE CONFIG HELPERS ──
function saveDriveConfig(){
  const clientId = document.getElementById('dm-client-id').value.trim();
  const apiKey   = document.getElementById('dm-api-key').value.trim();
  if(!clientId || !apiKey){ alert('Please enter both Client ID and API Key.'); return; }
  localStorage.setItem('cmnhs_gd_client_id', clientId);
  localStorage.setItem('cmnhs_gd_api_key',   apiKey);
  showToast('Google Drive credentials saved. Reloading…', 'green');
  setTimeout(() => location.reload(), 1500);
}

function clearDriveConfig(){
  if(!confirm('Disconnect Google Drive? Data will still be saved locally in this browser.')) return;
  localStorage.removeItem('cmnhs_gd_client_id');
  localStorage.removeItem('cmnhs_gd_api_key');
  gdSignOut();
  showToast('Google Drive disconnected.', 'green');
  setTimeout(() => location.reload(), 1200);
}

function exportJSON(){
  const payload = {
    _meta: {
      system: 'CMNHS e-LabTrack',
      school: 'Central Mangilala National High School',
      exportedAt: new Date().toISOString(),
      version: 1
    },
    equipment,
    nextId,
    borrows: borrows.map(b => ({
      ...b,
      borrowed: b.borrowed ? b.borrowed.toISOString() : null,
      returned: b.returned ? b.returned.toISOString() : null,
    })),
    nextBorrowId,
    accounts: Object.fromEntries(
      Object.entries(ACCOUNTS).filter(([u,a]) => a.role === 'teacher')
    )
  };
  const json = JSON.stringify(payload, null, 2);
  const date = new Date().toISOString().slice(0,10);
  downloadFile(`CMNHS_eLabTrack_backup_${date}.json`, json, 'application/json');
}

// ── EXPORT EQUIPMENT CSV ──
function exportEquipCSV(){
  const headers = ['ID','Name','Category','Serial Number','Quantity','Remarks','Description'];
  const rows = equipment.map(e => [
    e.id, csvEsc(e.name), csvEsc(e.cat), csvEsc(e.serial),
    e.qty, csvEsc(e.remarks), csvEsc(e.desc)
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\r\n');
  const date = new Date().toISOString().slice(0,10);
  downloadFile(`CMNHS_Equipment_${date}.csv`, csv, 'text/csv');
}

// ── EXPORT BORROW LOG CSV ──
function exportBorrowCSV(){
  const headers = ['ID','Equipment','Serial No.','Teacher / Borrower','Grade','Section','Qty','Date Borrowed','Date Returned','Condition','Status'];
  const rows = borrows.map(b => [
    b.id, csvEsc(b.equipName), csvEsc(b.serial||''), csvEsc(b.teacher),
    csvEsc(b.grade||''), csvEsc(b.section||''),
    b.qty||1,
    b.borrowed ? fmt(b.borrowed) : '',
    b.returned ? fmt(b.returned) : '',
    csvEsc(b.status||''),
    b.active ? 'Active' : 'Returned'
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\r\n');
  const date = new Date().toISOString().slice(0,10);
  downloadFile(`CMNHS_BorrowLog_${date}.csv`, csv, 'text/csv');
}

// ── IMPORT JSON ──
function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const d = JSON.parse(e.target.result);
      // Validate it's a CMNHS backup
      if(!d._meta || d._meta.system !== 'CMNHS e-LabTrack'){
        alert('Invalid file. Please select a CMNHS e-LabTrack backup (.json) file.');
        return;
      }
      if(!confirm(`Import backup from ${d._meta.exportedAt ? new Date(d._meta.exportedAt).toLocaleString('en-PH') : 'unknown date'}?\n\nThis will replace:\n• ${d.equipment?.length||0} equipment items\n• ${d.borrows?.length||0} borrow records\n• ${Object.keys(d.accounts||{}).length} teacher accounts\n\nThis cannot be undone. Continue?`)) return;

      // Apply imported data
      if(d.equipment)    equipment    = d.equipment;
      if(d.nextId)       nextId       = d.nextId;
      if(d.nextBorrowId) nextBorrowId = d.nextBorrowId;
      if(d.borrows){
        borrows = d.borrows.map(b => ({
          ...b,
          borrowed: b.borrowed ? new Date(b.borrowed) : null,
          returned: b.returned ? new Date(b.returned) : null,
        }));
      }
      if(d.accounts){
        Object.keys(d.accounts).forEach(u => {
          if(d.accounts[u].role === 'teacher') ACCOUNTS[u] = d.accounts[u];
        });
      }
      // Always keep built-in admin
      ACCOUNTS['admin'] = { pass: 'admin123', role: 'admin', displayName: 'System Admin' };

      saveToStorage();  // saves locally + triggers Drive sync if connected
      updateBorrowedCounts();
      closeModal();
      render();
      // Show success toast
      showToast(`✓ Import successful — ${equipment.length} equipment, ${borrows.length} borrow records loaded.`, 'green');
    } catch(err){
      alert('Failed to read the file. Make sure it is a valid CMNHS e-LabTrack backup.');
    }
  };
  reader.readAsText(file);
}

// ── HELPERS ──
function csvEsc(val){
  const s = String(val||'');
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? '"' + s.replace(/"/g, '""') + '"'
    : s;
}

function downloadFile(filename, content, mimeType){
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function showToast(msg, color){
  const colors = { green:'var(--green)', red:'var(--red)', amber:'var(--amber)' };
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;background:${colors[color]||colors.green};color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:loginIn 0.3s ease;max-width:320px`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
